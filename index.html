<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Uyo Drift — Babylon.js Racing Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ... (styles unchanged) ... */
</style>
</head>
<body>
  <!-- ... (HTML unchanged except maybe the off-track indicator text) ... -->
  <canvas id="renderCanvas"></canvas>

  <div id="hud">
    <!-- ... unchanged ... -->
    <div id="offTrack">Off Track</div>   <!-- changed text -->
    <div id="impactFlash"></div>
    <!-- ... rest unchanged ... -->
  </div>
  <!-- ... scripts ... -->

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
  (function () {
    'use strict';

    // ---------- CONFIG ----------
    const TOTAL_LAPS = 3;
    const TRACK_SAMPLES = 480;
    const TRACK_BASE_RADIUS = 150;
    const ROAD_HALF_WIDTH = 6;
    const PAVEMENT_WIDTH = 1.6;
    const WALL_LIMIT = ROAD_HALF_WIDTH + PAVEMENT_WIDTH; // 7.6
    const GRASS_DRAG = 6.0;          // extra deceleration when off-track (m/s²)
    const GRASS_LIMIT = 18.0;        // absolute outer boundary (far beyond pavement)
    const TREE_COUNT = 140;

    const MAX_SPEED = 46;
    const MAX_REVERSE = -16;
    const ACCEL_RATE = 26;
    const BRAKE_RATE = 42;
    const DRAG = 0.55;
    const WALL_IMPACT_LOSS = 0.65;   // still used only for extreme outer clamp (silent)
    const TURN_RATE = 1.85;          // reduced from 2.3 → more stable cornering
    const TURN_LOW_SPEED_RAMP = 8;
    const TURN_HIGH_SPEED_SOFTEN = 16;
    const TURN_MIN_STRENGTH = 0.3;

    // ---------- TILT SENSITIVITY ----------
    const TILT_SENSITIVITY_DEG = 28; // full lock needs more tilt → less twitchy
    const TILT_DEADZONE = 0.05;
    const TILT_SMOOTHING = 0.28;    // slightly heavier smoothing
    const TILT_CALIBRATION_SAMPLES = 8;

    // ... (rest of constants unchanged) ...

    // ---------- ENGINE / SCENE ----------
    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true);
    const scene = new BABYLON.Scene(engine);

    // ... (scene setup, track, road, trees, car, traffic, camera identical to original) ...

    // ---------- AUDIO / MUSIC ----------
    // ... (audio init, music sequencer all identical, except we still keep the impact thud
    //      available for potential future use, but we won't call it from wall hits) ...

    // ---------- IMPACT EFFECTS (now only used for traffic bumps, not walls) ----------
    // (spark, flash, thud functions remain but are called ONLY from traffic collisions)

    function triggerImpactEffect(x, y, z) {
      // Only triggered by traffic bumps now; wall/grass collisions do nothing.
      if (state.raceClock - lastImpactEffectTime < 0.5) return;
      lastImpactEffectTime = state.raceClock;
      spawnImpactSparks(x, y, z);
      flashImpactScreen();
      playImpactThud();
    }

    // ---------- NEAREST TRACK POINT ----------
    function nearestTrackIndex(x, z) {
      let best = Infinity, bestI = 0;
      for (let i = 0; i < N; i++) {
        const dx = trackPath[i].x - x, dz = trackPath[i].z - z;
        const d = dx * dx + dz * dz;
        if (d < best) { best = d; bestI = i; }
      }
      return { index: bestI, dist: Math.sqrt(best) };
    }

    // ---------- HUD ----------
    const el = {
      // ... (same as before) ...
      offTrack: document.getElementById('offTrack'),
      // ...
    };

    // ... (touch bindings, etc.) ...

    // ---------- MAIN UPDATE (modified off-track logic) ----------
    function update(dt) {
      updateTraffic(dt);
      updateMusicScheduler();
      updateSparks(dt);
      checkTiltSignal();
      if (!started || state.finished) return;
      state.raceClock += dt;

      const accel = isDown('w', 'arrowup');
      const brake = isDown('s', 'arrowdown');
      const left = isDown('a', 'arrowleft');
      const right = isDown('d', 'arrowright');

      if (accel) state.speed += ACCEL_RATE * dt;
      if (brake) state.speed -= BRAKE_RATE * dt;
      state.speed -= state.speed * DRAG * dt;
      state.speed = Math.max(MAX_REVERSE, Math.min(MAX_SPEED, state.speed));

      const absSpeed = Math.abs(state.speed);
      const rampUp = Math.min(1, absSpeed / TURN_LOW_SPEED_RAMP);
      const highSpeedEase = TURN_MIN_STRENGTH + (1 - TURN_MIN_STRENGTH) /
        (1 + Math.max(0, absSpeed - TURN_LOW_SPEED_RAMP) / TURN_HIGH_SPEED_SOFTEN);
      const turnStrength = rampUp * highSpeedEase;
      const speedFactor = Math.sign(state.speed || 1) * turnStrength;

      let steerInput = tiltSteer;
      if (left) steerInput -= 1;
      if (right) steerInput += 1;
      steerInput = Math.max(-1, Math.min(1, steerInput));

      state.heading += TURN_RATE * speedFactor * steerInput * dt;

      // Mild corner scrub (unchanged)
      if (steerInput !== 0) {
        state.speed -= Math.sign(state.speed || 1) * CORNER_SCRUB * turnStrength * Math.abs(steerInput) * dt;
      }

      state.x += Math.sin(state.heading) * state.speed * dt;
      state.z += Math.cos(state.heading) * state.speed * dt;

      // --- NEW: Soft off-track handling (grass / outer boundary) ---
      const nearest = nearestTrackIndex(state.x, state.z);
      const nearestPoint = trackPath[nearest.index];
      const perpHere = perpAt(nearest.index);
      const lateral = (state.x - nearestPoint.x) * perpHere.x + (state.z - nearestPoint.z) * perpHere.z;
      let offRoad = Math.abs(lateral) > ROAD_HALF_WIDTH;      // on grass
      let atOuterLimit = Math.abs(lateral) > GRASS_LIMIT;     // way too far

      if (offRoad) {
        // Apply grass drag: stronger deceleration when off the road
        state.speed -= Math.sign(state.speed || 1) * GRASS_DRAG * dt;
      }

      // Silent outer clamp: prevent car from escaping into the void,
      // but without any speed loss or visual effect
      if (atOuterLimit) {
        const targetLateral = Math.sign(lateral) * (GRASS_LIMIT - 0.3);
        const correction = targetLateral - lateral;
        state.x += perpHere.x * correction;
        state.z += perpHere.z * correction;
        // no speed reduction, no impact effects
      }

      // Show "Off Track" indicator whenever not on road surface
      el.offTrack.classList.toggle('show', offRoad);

      // Lap progress (unchanged wraparound logic)
      let indexDelta = nearest.index - state.lastNearestIndex;
      if (indexDelta > N / 2) indexDelta -= N;
      if (indexDelta < -N / 2) indexDelta += N;
      state.progress = Math.max(0, state.progress + indexDelta);

      if (state.progress >= N) {
        state.progress -= N;
        const lapTime = state.raceClock - state.lapStart;
        if (state.bestLap === null || lapTime < state.bestLap) state.bestLap = lapTime;
        state.lapStart = state.raceClock;
        if (state.lap >= TOTAL_LAPS) {
          state.finished = true;
          el.finalBest.textContent = formatTime(state.bestLap);
          el.startScreen.style.display = 'none';
          el.gameOverScreen.style.display = 'flex';
          el.overlay.style.display = 'flex';
        } else {
          state.lap += 1;
        }
      }
      state.lastNearestIndex = nearest.index;

      // Update car visuals
      car.position.set(state.x, 0, state.z);
      car.rotation.y = state.heading;
      const targetRoll = steerInput * 0.12 * turnStrength;
      state.roll += (targetRoll - state.roll) * 0.12;
      car.rotation.z = state.roll;

      // HUD updates
      el.lapCount.textContent = state.lap;
      el.lapTime.textContent = formatTime(state.raceClock - state.lapStart);
      el.bestTime.textContent = state.bestLap === null ? '—' : formatTime(state.bestLap);
      el.speedValue.textContent = Math.round(Math.abs(state.speed) * 3.6);

      updateAudio();
    }

    // ... (rest unchanged: render loop, etc.) ...
  })();
  </script>
</body>
</html>
