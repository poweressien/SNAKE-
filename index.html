<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg:       #0d0d0d;
      --surface:  #111;
      --border:   #1e1e1e;
      --border2:  #2a2a2a;
      --snake:    #e8e8e8;
      --food:     #00e5ff;
      --bonus:    #ffdd00;
      --obstacle: #ff3c3c;
      --text:     #555;
      --text2:    #333;
      --text3:    #222;
      --hover:    #161616;
      --radius:   10px;
      --mono:     'Space Mono', monospace;
      --hist-row: #0f0f0f;
      --glow-f:   0 0 14px rgba(0,229,255,.7);
      --glow-b:   0 0 14px rgba(255,221,0,.7);
    }
    [data-theme="light"] {
      --bg:       #f5f5f0;
      --surface:  #ebebE6;
      --border:   #d8d8d0;
      --border2:  #c0c0b8;
      --snake:    #1a1a1a;
      --food:     #0077aa;
      --bonus:    #cc8800;
      --obstacle: #cc2200;
      --text:     #888;
      --text2:    #aaa;
      --text3:    #bbb;
      --hover:    #e2e2dc;
      --hist-row: #eeeeea;
      --glow-f:   0 0 10px rgba(0,119,170,.3);
      --glow-b:   0 0 10px rgba(204,136,0,.3);
    }
    [data-theme="sepia"] {
      --bg:       #1a1510;
      --surface:  #201a13;
      --border:   #2e2418;
      --border2:  #3d3020;
      --snake:    #e8d5b0;
      --food:     #c8860a;
      --bonus:    #e8c84a;
      --obstacle: #c84a2a;
      --text:     #7a6a50;
      --text2:    #4a3c28;
      --text3:    #3a2e1c;
      --hover:    #2a2018;
      --hist-row: #1d1710;
      --glow-f:   0 0 12px rgba(200,134,10,.4);
      --glow-b:   0 0 12px rgba(232,200,74,.4);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: var(--mono);
      color: var(--text);
      gap: 14px; padding: 16px;
      user-select: none;
      transition: background .25s, color .25s;
    }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 400px;
    }
    .logo { font-size: 1rem; font-weight: 700; color: var(--text2); letter-spacing: .18em; }
    .logo span { color: var(--food); }
    .theme-toggle { display: flex; gap: 4px; }
    .theme-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1px solid var(--border2); cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: var(--food); box-shadow: 0 0 0 1px var(--food); }
    .theme-dot[data-t="dark"]  { background: #1a1a1a; }
    .theme-dot[data-t="light"] { background: #ebebE6; }
    .theme-dot[data-t="sepia"] { background: #3d2e1c; }

    /* HUD */
    .hud {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 8px; width: 100%; max-width: 400px;
    }
    .hud-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 8px; text-align: center;
      transition: background .25s, border-color .25s;
    }
    .hud-label { font-size: .52rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
    .hud-val { font-size: 1.3rem; font-weight: 700; }
    #sv  { color: var(--food); }
    #bv  { color: var(--bonus); }
    #lv  { color: var(--snake); }
    #stv { color: var(--text2); }

    /* CANVAS WRAP */
    .board {
      position: relative; width: 100%; max-width: 400px;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--surface);
      transition: border-color .25s;
    }
    .board.shake { animation: shake .35s ease; }
    @keyframes shake {
      0%,100%{transform:translate(0,0)rotate(0)}
      15%{transform:translate(-6px,4px)rotate(-.5deg)}
      30%{transform:translate(5px,-5px)rotate(.4deg)}
      45%{transform:translate(-4px,6px)rotate(-.3deg)}
      60%{transform:translate(6px,-3px)rotate(.3deg)}
      75%{transform:translate(-3px,3px)rotate(-.2deg)}
      90%{transform:translate(3px,-2px)rotate(.1deg)}
    }
    canvas { display: block; width: 100%; height: auto; }

    /* OVERLAY */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: rgba(13,13,13,.92); backdrop-filter: blur(6px);
      border-radius: var(--radius); transition: opacity .25s;
    }
    [data-theme="light"] .overlay { background: rgba(245,245,240,.92); }
    [data-theme="sepia"] .overlay { background: rgba(26,21,16,.92); }
    .overlay.gone { opacity:0; pointer-events:none; }
    .ov-title { font-size: clamp(1.1rem,4vw,1.5rem); font-weight:700; color: var(--snake); letter-spacing:.12em; }
    .ov-sub   { font-size: .7rem; color: var(--text2); letter-spacing:.08em; }
    .ov-stats { display:flex; gap:18px; font-size:.7rem; }
    .ov-stat  { color: var(--text2); }
    .ov-stat span { color: var(--food); }
    .ov-stats.hidden { display:none; }
    .btn {
      padding: 11px 28px; border-radius: var(--radius); border: 1px solid var(--border2);
      background: transparent; color: var(--snake); font-family: var(--mono);
      font-size: .8rem; font-weight: 700; cursor: pointer; letter-spacing: .08em;
      transition: border-color .15s, color .15s, box-shadow .15s;
    }
    .btn:hover { border-color: var(--food); color: var(--food); box-shadow: 0 0 16px color-mix(in srgb, var(--food) 30%, transparent); }
    .btn:active { transform: scale(.96); }

    /* STREAK BAR */
    .streak-bar { width:100%; max-width:400px; height:2px; background:var(--border); border-radius:1px; overflow:hidden; }
    .streak-fill { height:100%; width:0%; background:var(--food); border-radius:1px; transition: width .12s, background .3s; box-shadow: 0 0 5px var(--food); }

    /* LEGEND */
    .legend {
      display: flex; gap: 14px; align-items: center;
      font-size: .55rem; letter-spacing: .08em; color: var(--text3); text-transform: uppercase;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* SPEED + WRAP PILLS */
    .controls-row { display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap; }
    .ctl-tag { font-size:.52rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); }
    .pill {
      padding:5px 11px; border-radius:20px; border:1px solid var(--border);
      background:transparent; color:var(--text2); font-family:var(--mono);
      font-size:.6rem; cursor:pointer; letter-spacing:.05em; transition:all .15s;
    }
    .pill:hover { border-color: var(--border2); color: var(--text); }
    .pill.on { border-color: var(--food); color: var(--food); background: color-mix(in srgb, var(--food) 8%, transparent); }

    /* D-PAD */
    .dpad {
      display:grid;
      grid-template-areas:". u ." "l . r" ". d .";
      grid-template-columns:repeat(3,52px); grid-template-rows:repeat(3,52px); gap:5px;
    }
    .db {
      background:var(--surface); border:1px solid var(--border); border-radius:9px;
      display:flex; align-items:center; justify-content:center; font-size:1.1rem;
      cursor:pointer; color:var(--text2); -webkit-tap-highlight-color:transparent;
      transition:background .08s, border-color .08s, color .08s;
    }
    .db:active, .db.p { background:var(--hover); border-color:var(--border2); color:var(--snake); }
    .du{grid-area:u} .dl{grid-area:l} .dr{grid-area:r} .dd{grid-area:d}

    /* STATS STRIP */
    .stats {
      display:flex; justify-content:space-between; width:100%; max-width:400px;
      font-size:.55rem; letter-spacing:.08em; color:var(--text3);
    }
    .stats span { color: var(--text2); }

    /* HISTORY */
    .hist-wrap { width:100%; max-width:400px; }
    .hist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .hist-title { font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); }
    .hist-clear { font-size:.55rem; color:var(--text3); background:none; border:none; cursor:pointer; font-family:var(--mono); transition:color .15s; }
    .hist-clear:hover { color:var(--text); }
    .hist-list {
      display:flex; flex-direction:column; gap:5px;
      max-height:160px; overflow-y:auto;
      scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
    }
    .hist-list::-webkit-scrollbar { width:3px; }
    .hist-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
    .hist-row {
      display:grid; grid-template-columns:auto 1fr auto auto;
      gap:10px; align-items:center;
      background:var(--hist-row); border:1px solid var(--border);
      border-radius:7px; padding:7px 10px;
      font-size:.58rem; letter-spacing:.04em;
      animation: slide-in .2s ease;
    }
    @keyframes slide-in { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .hist-score { font-weight:700; font-size:.75rem; color:var(--food); min-width:36px; }
    .hist-info  { color:var(--text2); }
    .hist-diff  { font-size:.5rem; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); border:1px solid var(--border); border-radius:4px; padding:2px 6px; }
    .hist-time  { color:var(--text3); font-size:.5rem; text-align:right; }
    .hist-empty { text-align:center; font-size:.6rem; color:var(--text3); padding:20px 0; letter-spacing:.08em; }

    @media(max-width:380px){
      .hud{grid-template-columns:repeat(2,1fr)}
      .dpad{grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px)}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">SNA<span>KE</span></div>
  <div class="theme-toggle">
    <div class="theme-dot active" data-t="dark"></div>
    <div class="theme-dot"        data-t="light"></div>
    <div class="theme-dot"        data-t="sepia"></div>
  </div>
</div>

<div class="hud">
  <div class="hud-card"><div class="hud-label">Score</div><div class="hud-val" id="sv">0</div></div>
  <div class="hud-card"><div class="hud-label">Best</div><div class="hud-val"  id="bv">0</div></div>
  <div class="hud-card"><div class="hud-label">Level</div><div class="hud-val" id="lv">1</div></div>
  <div class="hud-card"><div class="hud-label">Streak</div><div class="hud-val" id="stv">0</div></div>
</div>

<div class="board" id="board">
  <canvas id="c" width="400" height="400"></canvas>
  <div class="overlay" id="ov">
    <div class="ov-title" id="ov-t">SNAKE</div>
    <div class="ov-sub"   id="ov-s">PRESS ANY KEY OR TAP TO START</div>
    <div class="ov-stats hidden" id="ov-stats">
      <div class="ov-stat">Score <span id="fin-s">0</span></div>
      <div class="ov-stat">Level <span id="fin-l">0</span></div>
      <div class="ov-stat">Length <span id="fin-ln">0</span></div>
    </div>
    <button class="btn" id="ov-btn">Start</button>
  </div>
</div>

<div class="streak-bar"><div class="streak-fill" id="sfill"></div></div>

<div class="legend">
  <div><span class="legend-dot" style="background:var(--food)"></span>Food +10</div>
  <div><span class="legend-dot" style="background:var(--bonus)"></span>Bonus +30</div>
  <div><span class="legend-dot" style="background:var(--obstacle)"></span>Wall = death</div>
</div>

<div class="controls-row">
  <span class="ctl-tag">Speed</span>
  <button class="pill on" data-sp="160">Chill</button>
  <button class="pill"    data-sp="110">Normal</button>
  <button class="pill"    data-sp="65">Fast</button>
  <button class="pill"    data-sp="38">Insane</button>
  <span class="ctl-tag" style="margin-left:6px">Walls</span>
  <button class="pill on" id="wrap-off">Solid</button>
  <button class="pill"    id="wrap-on">Wrap</button>
</div>

<div class="dpad">
  <button class="db du" data-d="U">▲</button>
  <button class="db dl" data-d="L">◀</button>
  <button class="db dr" data-d="R">▶</button>
  <button class="db dd" data-d="D">▼</button>
</div>

<div class="stats">
  <div>DEATHS <span id="deaths-el">0</span></div>
  <div>BEST STREAK <span id="bstreak-el">0</span></div>
  <div>TOTAL FOOD <span id="tfood-el">0</span></div>
</div>

<div class="hist-wrap">
  <div class="hist-header">
    <div class="hist-title">High Score History</div>
    <button class="hist-clear" id="hist-clear">Clear</button>
  </div>
  <div class="hist-list" id="hist-list">
    <div class="hist-empty">No runs yet</div>
  </div>
</div>

<script>
(() => {
  // ── CONFIG ────────────────────────────────────────────────
  const G = 20, SZ = 400, CS = SZ / G;
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  // ── PERSISTENT STATE ──────────────────────────────────────
  let pdata = { best:0, deaths:0, bstreak:0, tfood:0, history:[], theme:'dark', speed:160 };
  try { const s = JSON.parse(localStorage.getItem('snake_v2')||'{}'); Object.assign(pdata,s); } catch(e){}

  function persist() { localStorage.setItem('snake_v2', JSON.stringify(pdata)); }

  // ── GAME STATE ────────────────────────────────────────────
  let snake, dir, nextDir, food, bonus, obstacles;
  let score, level, streak, totalFood;
  let running=false, wrap=false, baseSpeed=pdata.speed||160, speed=baseSpeed;
  let loop, raf, deathAnim=false;

  // ── THEME ─────────────────────────────────────────────────
  function applyTheme(t) {
    pdata.theme = t;
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.t===t));
    persist();
  }
  document.querySelectorAll('.theme-dot').forEach(d => d.addEventListener('click', ()=>applyTheme(d.dataset.t)));
  applyTheme(pdata.theme);

  // ── INIT ──────────────────────────────────────────────────
  function initGame() {
    snake     = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir       = {x:1,y:0}; nextDir = {x:1,y:0};
    score     = 0; level = 1; streak = 0; totalFood = 0;
    bonus     = null; obstacles = [];
    deathAnim = false;
    placeFood();
    updateHUD();
  }

  function ri(n) { return Math.floor(Math.random()*n); }

  function occupied(p) {
    return snake.some(s=>s.x===p.x&&s.y===p.y)
        || obstacles.some(o=>o.x===p.x&&o.y===p.y)
        || (food && food.x===p.x && food.y===p.y)
        || (bonus && bonus.x===p.x && bonus.y===p.y);
  }

  function rndPos() {
    let p, tries=0;
    do { p={x:ri(G),y:ri(G)}; tries++; } while(occupied(p) && tries<200);
    return p;
  }

  function placeFood() { food = rndPos(); }

  function maybeSpawnBonus() {
    if (!bonus && Math.random()<0.3) {
      bonus = { pos:rndPos(), timer:60+ri(30) }; // disappears in 60-90 ticks
    }
  }

  function spawnObstacle() {
    // Only after level 2, max obstacles = level-1 capped at 8
    const max = Math.min(level-1, 8);
    if (obstacles.length < max) {
      obstacles.push(rndPos());
    }
  }

  // ── DRAW ──────────────────────────────────────────────────
  // CSS variable reader (for canvas which can't use CSS vars)
  const style = getComputedStyle(document.documentElement);
  function cv(name) { return style.getPropertyValue(name).trim(); }

  function getColors() {
    const s = getComputedStyle(document.documentElement);
    return {
      bg:       s.getPropertyValue('--bg').trim(),
      snake:    s.getPropertyValue('--snake').trim(),
      food:     s.getPropertyValue('--food').trim(),
      bonus:    s.getPropertyValue('--bonus').trim(),
      obstacle: s.getPropertyValue('--obstacle').trim(),
      border:   s.getPropertyValue('--border').trim(),
    };
  }

  let flashAlpha = 0; // for death flash

  function draw() {
    const C = getColors();
    const now = Date.now();

    ctx.clearRect(0,0,SZ,SZ);
    ctx.fillStyle = C.bg;
    ctx.fillRect(0,0,SZ,SZ);

    // Grid
    ctx.strokeStyle = 'rgba(128,128,128,0.045)';
    ctx.lineWidth = .5;
    for(let i=1;i<G;i++){
      ctx.beginPath();ctx.moveTo(i*CS,0);ctx.lineTo(i*CS,SZ);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*CS);ctx.lineTo(SZ,i*CS);ctx.stroke();
    }

    // Obstacles
    obstacles.forEach(o => {
      ctx.shadowColor = C.obstacle; ctx.shadowBlur = 8;
      ctx.fillStyle = C.obstacle + '33';
      roundRect(ctx, o.x*CS+1, o.y*CS+1, CS-2, CS-2, 4);
      ctx.fill();
      ctx.strokeStyle = C.obstacle + '88'; ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.shadowBlur = 0;
      // X mark
      ctx.strokeStyle = C.obstacle; ctx.lineWidth = 1.5;
      const p=6;
      ctx.beginPath();ctx.moveTo(o.x*CS+p,o.y*CS+p);ctx.lineTo(o.x*CS+CS-p,o.y*CS+CS-p);ctx.stroke();
      ctx.beginPath();ctx.moveTo(o.x*CS+CS-p,o.y*CS+p);ctx.lineTo(o.x*CS+p,o.y*CS+CS-p);ctx.stroke();
    });

    // Main food
    if(food) {
      const pulse = .82 + .18*Math.sin(now/200);
      const fx=food.x*CS+CS/2, fy=food.y*CS+CS/2;
      ctx.shadowColor=C.food; ctx.shadowBlur=16*pulse;
      ctx.fillStyle=C.food;
      ctx.beginPath(); ctx.arc(fx,fy,(CS/2-4)*pulse,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // Bonus food
    if(bonus) {
      const bp = .78 + .22*Math.abs(Math.sin(now/150));
      const bx=bonus.pos.x*CS+CS/2, by=bonus.pos.y*CS+CS/2;
      // countdown ring
      const frac = bonus.timer / 90;
      ctx.strokeStyle = C.bonus+'55'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(bx,by,CS/2-2,-Math.PI/2,-Math.PI/2+Math.PI*2*frac); ctx.stroke();
      // dot
      ctx.shadowColor=C.bonus; ctx.shadowBlur=18*bp;
      ctx.fillStyle=C.bonus;
      ctx.beginPath(); ctx.arc(bx,by,(CS/2-5)*bp,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      // star label
      ctx.fillStyle='#000'; ctx.font=`bold ${CS*.4}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('★',bx,by+1);
    }

    // Snake
    for(let i=snake.length-1;i>=0;i--){
      const seg=snake[i], isH=i===0;
      const t=i/(snake.length-1||1);
      const pad=isH?1.5:2+t*1.5;
      const r=isH?6:Math.max(3,5-t*2);
      const bright=isH?232:Math.max(45,Math.round(200-t*175));

      if(pdata.theme==='dark'||pdata.theme==='sepia'){
        const base = pdata.theme==='sepia'
          ? `rgba(232,213,176,${isH?1:1-t*.65})`
          : `rgba(${bright},${bright},${bright},${isH?1:1-t*.55})`;
        ctx.fillStyle=base;
      } else {
        ctx.fillStyle=`rgba(${26+Math.round(t*10)},${26+Math.round(t*10)},${26+Math.round(t*10)},${isH?1:1-t*.5})`;
      }

      ctx.shadowColor = isH ? C.snake : 'transparent';
      ctx.shadowBlur  = isH ? 12 : 0;

      roundRect(ctx, seg.x*CS+pad, seg.y*CS+pad, CS-pad*2, CS-pad*2, r);
      ctx.fill();
      ctx.shadowBlur=0;

      if(isH) drawEyes(seg,dir);
    }

    // Death flash overlay
    if(flashAlpha>0) {
      ctx.fillStyle=`rgba(255,40,40,${flashAlpha})`;
      ctx.fillRect(0,0,SZ,SZ);
    }

    if(running) raf=requestAnimationFrame(draw);
  }

  function drawEyes(h,d) {
    ctx.fillStyle='rgba(0,0,0,0.8)';
    const cx=h.x*CS, cy=h.y*CS;
    let pts;
    const o=5, e=CS-8;
    if(d.x===1)  pts=[[cx+e,cy+o],[cx+e,cy+CS-o-3]];
    if(d.x===-1) pts=[[cx+3,cy+o],[cx+3,cy+CS-o-3]];
    if(d.y===-1) pts=[[cx+o,cy+3],[cx+CS-o-3,cy+3]];
    if(d.y===1)  pts=[[cx+o,cy+e],[cx+CS-o-3,cy+e]];
    if(!pts)return;
    pts.forEach(([ex,ey])=>{ ctx.beginPath();ctx.arc(ex,ey,2.2,0,Math.PI*2);ctx.fill(); });
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  // ── TICK ──────────────────────────────────────────────────
  function tick() {
    dir = {...nextDir};
    let nx=snake[0].x+dir.x, ny=snake[0].y+dir.y;

    if(wrap){ nx=(nx+G)%G; ny=(ny+G)%G; }
    else if(nx<0||nx>=G||ny<0||ny>=G){ return die(); }

    if(snake.some(s=>s.x===nx&&s.y===ny)) return die();
    if(obstacles.some(o=>o.x===nx&&o.y===ny)) return die();

    snake.unshift({x:nx,y:ny});

    let ate=false;

    if(food&&nx===food.x&&ny===food.y){
      score+=10; streak++; totalFood++;
      pdata.bstreak=Math.max(pdata.bstreak,streak);
      food=null; placeFood();
      maybeSpawnBonus();
      ate=true;
      // Level up every 5 food
      const newLevel=Math.floor(totalFood/5)+1;
      if(newLevel>level){ level=newLevel; spawnObstacle(); }
      // Speed up every 3 food
      if(totalFood%3===0){ speed=Math.max(38,speed-6); clearInterval(loop); loop=setInterval(tick,speed); }
    }
    else if(bonus&&nx===bonus.pos.x&&ny===bonus.pos.y){
      score+=30; streak++; totalFood++;
      pdata.bstreak=Math.max(pdata.bstreak,streak);
      bonus=null; ate=true;
    }
    else { snake.pop(); }

    if(bonus){ bonus.timer--; if(bonus.timer<=0) bonus=null; }

    if(ate){
      pdata.best=Math.max(pdata.best,score);
      pdata.tfood=(pdata.tfood||0)+1;
    }

    updateHUD();
  }

  // ── DEATH ─────────────────────────────────────────────────
  function die() {
    running=false; clearInterval(loop);
    pdata.deaths=(pdata.deaths||0)+1;
    persist();

    // Record history
    const now=new Date();
    pdata.history.unshift({
      score, level, length:snake.length,
      speed: baseSpeed,
      date: now.toLocaleDateString([],{month:'short',day:'numeric'}),
      time: now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    });
    if(pdata.history.length>20) pdata.history.pop();
    persist();

    // Screen shake
    const boardEl=document.getElementById('board');
    boardEl.classList.add('shake');
    setTimeout(()=>boardEl.classList.remove('shake'),400);

    // Death flash animation
    flashAlpha=0.55;
    let flashes=0;
    const flashLoop=setInterval(()=>{
      flashAlpha=flashes%2===0 ? 0 : 0.35;
      flashes++;
      if(flashes>6){ clearInterval(flashLoop); flashAlpha=0; showOver(); }
    },80);

    // Keep drawing during death
    raf=requestAnimationFrame(draw);
    setTimeout(()=>cancelAnimationFrame(raf),700);
  }

  function showOver() {
    draw(); // clean final frame
    document.getElementById('ov-t').textContent='DEAD';
    document.getElementById('ov-s').textContent='TAP TO TRY AGAIN';
    document.getElementById('fin-s').textContent=score;
    document.getElementById('fin-l').textContent=level;
    document.getElementById('fin-ln').textContent=snake.length;
    document.getElementById('ov-stats').classList.remove('hidden');
    document.getElementById('ov-btn').textContent='Again';
    document.getElementById('ov').classList.remove('gone');
    updateHUD();
    renderHistory();
  }

  // ── HUD ───────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('sv').textContent  = score;
    document.getElementById('bv').textContent  = pdata.best||0;
    document.getElementById('lv').textContent  = level;
    document.getElementById('stv').textContent = streak;
    document.getElementById('deaths-el').textContent  = pdata.deaths||0;
    document.getElementById('bstreak-el').textContent = pdata.bstreak||0;
    document.getElementById('tfood-el').textContent   = pdata.tfood||0;

    const pct = ((streak%3)/3)*100;
    const fill=document.getElementById('sfill');
    fill.style.width=pct+'%';
    const fc = streak>=9?'#ff3cac':streak>=6?'#ff9500':'var(--food)';
    fill.style.background=fc; fill.style.boxShadow=`0 0 5px ${fc}`;
  }

  // ── HISTORY ───────────────────────────────────────────────
  function renderHistory() {
    const list=document.getElementById('hist-list');
    if(!pdata.history||pdata.history.length===0){
      list.innerHTML='<div class="hist-empty">No runs yet</div>'; return;
    }
    list.innerHTML='';
    pdata.history.forEach(h=>{
      const row=document.createElement('div');
      row.className='hist-row';
      const spLabel = h.speed<=38?'Insane':h.speed<=65?'Fast':h.speed<=110?'Normal':'Chill';
      row.innerHTML=`
        <div class="hist-score">${h.score}</div>
        <div class="hist-info">Lvl ${h.level} · Length ${h.length}</div>
        <div class="hist-diff">${spLabel}</div>
        <div class="hist-time">${h.date} ${h.time}</div>
      `;
      list.appendChild(row);
    });
  }

  document.getElementById('hist-clear').addEventListener('click',()=>{
    pdata.history=[]; persist(); renderHistory();
  });

  // ── START/LOOP ────────────────────────────────────────────
  function startGame() {
    cancelAnimationFrame(raf); clearInterval(loop);
    initGame();
    speed=baseSpeed;
    running=true;
    document.getElementById('ov').classList.add('gone');
    document.getElementById('ov-stats').classList.add('hidden');
    loop=setInterval(tick,speed);
    raf=requestAnimationFrame(draw);
  }

  // ── INPUT ─────────────────────────────────────────────────
  const KEYS={ArrowUp:{x:0,y:-1},w:{x:0,y:-1},ArrowDown:{x:0,y:1},s:{x:0,y:1},ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},ArrowRight:{x:1,y:0},d:{x:1,y:0}};
  document.addEventListener('keydown',e=>{
    const d=KEYS[e.key]; if(d){e.preventDefault();setDir(d);}
    if(!running) startGame();
  });
  function setDir(d){ if(d.x===-dir.x&&d.y===-dir.y)return; nextDir=d; }

  const DMAP={U:{x:0,y:-1},D:{x:0,y:1},L:{x:-1,y:0},R:{x:1,y:0}};
  document.querySelectorAll('.db').forEach(b=>{
    const go=()=>{ setDir(DMAP[b.dataset.d]); if(!running)startGame(); b.classList.add('p'); };
    const rel=()=>b.classList.remove('p');
    b.addEventListener('touchstart',e=>{e.preventDefault();go();},{passive:false});
    b.addEventListener('touchend',rel,{passive:true});
    b.addEventListener('mousedown',go);
    b.addEventListener('mouseup',rel);
  });

  // Swipe
  let ts=null;
  canvas.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  canvas.addEventListener('touchend',e=>{
    if(!ts)return;
    const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
    if(Math.abs(dx)<12&&Math.abs(dy)<12)return;
    setDir(Math.abs(dx)>Math.abs(dy)?(dx>0?{x:1,y:0}:{x:-1,y:0}):(dy>0?{x:0,y:1}:{x:0,y:-1}));
    if(!running)startGame(); ts=null;
  },{passive:true});

  document.getElementById('board').addEventListener('click',()=>{ if(!running)startGame(); });
  document.getElementById('ov-btn').addEventListener('click',startGame);

  // Speed pills
  document.querySelectorAll('[data-sp]').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('[data-sp]').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      baseSpeed=parseInt(b.dataset.sp); pdata.speed=baseSpeed;
      if(running){ speed=baseSpeed; clearInterval(loop); loop=setInterval(tick,speed); }
      persist();
    });
  });
  // set active on load
  document.querySelectorAll('[data-sp]').forEach(b=>b.classList.toggle('on',+b.dataset.sp===baseSpeed));

  // Wrap toggle
  document.getElementById('wrap-off').addEventListener('click',()=>{
    wrap=false;
    document.getElementById('wrap-off').classList.add('on');
    document.getElementById('wrap-on').classList.remove('on');
  });
  document.getElementById('wrap-on').addEventListener('click',()=>{
    wrap=true;
    document.getElementById('wrap-on').classList.add('on');
    document.getElementById('wrap-off').classList.remove('on');
  });

  // ── BOOT ──────────────────────────────────────────────────
  initGame(); draw();
  cancelAnimationFrame(raf);
  updateHUD(); renderHistory();

})();
</script>
</body>
</html>
